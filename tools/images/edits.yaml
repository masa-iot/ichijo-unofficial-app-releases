# manual.html / index.html 用スクショの編集定義
#
# `docs/images/_raw/*.png` を原本として、ここに書いた ops を適用して
# `docs/images/*.webp` (と index 用 `*.png`) を生成する。
#
# ops:
#   - mask: [x, y, w, h]             # 灰色(#D5D5D5)で矩形マスク
#   - mask: [x, y, w, h, "#000000"]  # 色指定
#   - crop: [x, y, w, h]             # 矩形クロップ
#   - resize: [width]                # 幅指定（縦横比保持）
#
# src を省略すると dst と同名の _raw/*.png を使う。
# dst 省略時は src と同名（dst 無指定でマスクだけ適用、など）。
#
# INDEX_HTML_PNG: true を付けた dst は .webp に加えて .png も生成（index.html 用）。

entries:
  # ── 強調（赤枠） ─────────────────────────────
  # settings_mode_living_on: モード切替セクションを赤枠で囲む
  - dst: settings_mode_living_on.png
    ops:
      - highlight: [45, 1620, 1230, 420, "#E53935", 14]

  # ── 派生/トリミング ───────────────────────────
  # home_countdown / home_life_counter: 上部1/3（ステータスバー除外、カード重視）
  - dst: home_countdown.png
    ops:
      - crop: [0, 170, 1320, 786]
  - dst: home_life_counter.png
    ops:
      - crop: [0, 170, 1320, 786]
  # diff_page_nav: 画面下部のページナビ + 差分/旧/新 セグメント帯のみ抜き出し
  - dst: diff_page_nav.png
    ops:
      - crop: [0, 2620, 1320, 248]
  # diff_adjusted_switch: 上部のトグル＋フィルタ周辺だけにトリミング
  - dst: diff_adjusted_switch.png
    ops:
      - crop: [0, 170, 1320, 786]
  # diff_filter_dropdown / diff_filter_ultra: 上半分にトリミング（ドロップダウン UI 重視）
  - dst: diff_filter_dropdown.png
    ops:
      - crop: [0, 170, 1320, 1264]
  - dst: diff_filter_ultra.png
    ops:
      - crop: [0, 170, 1320, 1264]

  # ── 各機能セクション冒頭用: ホームタイル赤枠ハイライト ────
  # Row 1
  - src: home_ieduzukuri.png
    dst: home_highlight_doc.png
    ops:
      - highlight: [30, 395, 630, 420, "#E53935", 14]
      - crop: [0, 170, 1320, 2528]
  - src: home_ieduzukuri.png
    dst: home_highlight_import.png
    ops:
      - highlight: [660, 395, 630, 420, "#E53935", 14]
      - crop: [0, 170, 1320, 2528]
  # Row 2
  - src: home_ieduzukuri.png
    dst: home_highlight_estimate.png
    ops:
      - highlight: [30, 845, 630, 420, "#E53935", 14]
      - crop: [0, 170, 1320, 2528]
  - src: home_ieduzukuri.png
    dst: home_highlight_diff.png
    ops:
      - highlight: [660, 845, 630, 420, "#E53935", 14]
      - crop: [0, 170, 1320, 2528]
  # Row 3
  - src: home_ieduzukuri.png
    dst: home_highlight_spec.png
    ops:
      - highlight: [30, 1295, 630, 420, "#E53935", 14]
      - crop: [0, 170, 1320, 2528]
  - src: home_ieduzukuri.png
    dst: home_highlight_memo.png
    ops:
      - highlight: [660, 1295, 630, 420, "#E53935", 14]
      - crop: [0, 170, 1320, 2528]
  # Row 4
  - src: home_ieduzukuri.png
    dst: home_highlight_bookmark.png
    ops:
      - highlight: [30, 1745, 630, 420, "#E53935", 14]
      - crop: [0, 170, 1320, 2528]
  - src: home_ieduzukuri.png
    dst: home_highlight_schedule.png
    ops:
      - highlight: [660, 1745, 630, 420, "#E53935", 14]
      - crop: [0, 170, 1320, 2528]
  # Row 5
  - src: home_ieduzukuri.png
    dst: home_highlight_tools.png
    ops:
      - highlight: [30, 2195, 630, 420, "#E53935", 14]
      - crop: [0, 170, 1320, 2528]
  - src: home_ieduzukuri.png
    dst: home_highlight_settings.png
    ops:
      - highlight: [660, 2195, 630, 420, "#E53935", 14]
      - crop: [0, 170, 1320, 2528]
  # 暮らしモード専用（home_living.png をベース）
  - src: home_living.png
    dst: home_highlight_electricity.png
    ops:
      - highlight: [30, 395, 630, 420, "#E53935", 14]
      - crop: [0, 170, 1320, 2528]
  - src: home_living.png
    dst: home_highlight_iedukuri_record.png
    ops:
      - highlight: [30, 1295, 630, 420, "#E53935", 14]
      - crop: [0, 170, 1320, 2528]

  # settings_debug_tools / settings_parse_dump: Debug Tools セクションのみ切り出し
  - dst: settings_debug_tools.png
    ops:
      - crop: [0, 2150, 1320, 720]
  - dst: settings_parse_dump.png
